document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 <div style=\"margin-bottom:12px;\">\n            <div style=\"font-size:12px;font-weight:600;color:#5B6172;margin-bottom:5px;\">Name<\u002Fdiv>\n            <input type=\"text\" value=\"{{ authName }}\" onchange=\"{{ updateAuthNameHandler }}\" style=\"width:100%;box-sizing:border-box;padding:11px 12px;border-radius:9px;border:1.5px solid #E7E5E0;font-size:14px;font-family:'Inter';\">\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"margin-bottom:12px;\">\n          <div style=\"font-size:12px;font-weight:600;color:#5B6172;margin-bottom:5px;\">Email<\u002Fdiv>\n          <input type=\"email\" value=\"{{ authEmail }}\" onchange=\"{{ updateAuthEmailHandler }}\" style=\"width:100%;box-sizing:border-box;padding:11px 12px;border-radius:9px;border:1.5px solid #E7E5E0;font-size:14px;font-family:'Inter';\">\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:6px;\">\n          <div style=\"font-size:12px;font-weight:600;color:#5B6172;margin-bottom:5px;\">Password<\u002Fdiv>\n          <input type=\"password\" value=\"{{ authPassword }}\" onchange=\"{{ updateAuthPasswordHandler }}\" style=\"width:100%;box-sizing:border-box;padding:11px 12px;border-radius:9px;border:1.5px solid #E7E5E0;font-size:14px;font-family:'Inter';\">\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasAuthError }}\">\n          <div style=\"font-size:13px;color:#DC2626;margin-top:8px;\">{{ authError }}<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <button style=\"width:100%;margin-top:16px;background:#4F46E5;color:#FFFFFF;border:none;border-radius:10px;padding:12px 0;font-weight:600;font-size:14px;cursor:pointer;font-family:'Inter';\" onclick=\"{{ submitAuthHandler }}\">{{ authSubmitLabel }}<\u002Fbutton>\n\n        <div style=\"text-align:center;margin-top:16px;font-size:13px;color:#5B6172;\">\n          {{ authToggleQuestion }} <span style=\"color:#4F46E5;font-weight:600;cursor:pointer;\" onclick=\"{{ toggleAuthModeHandler }}\">{{ authToggleAction }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"text-align:center;margin-top:14px;font-size:11px;color:#9CA3AF;\">This device only — your account and progress are stored locally in this browser.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isAuthed }}\">\n  <header style=\"position:sticky;top:0;z-index:10;background:#FFFFFF;border-bottom:1px solid #E7E5E0;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:10px;cursor:pointer;\" onclick=\"{{ goToDashboardHandler }}\">\n        <div style=\"width:34px;height:34px;border-radius:9px;background:#4F46E5;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n          <div style=\"width:12px;height:12px;border-radius:3px;background:#FFFFFF;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Lexend',sans-serif;font-weight:700;font-size:19px;\">Compute Academy<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;\">\n        <div style=\"font-size:13px;color:#5B6172;\">{{ percent }}% of Course 1 complete<\u002Fdiv>\n        <div style=\"width:120px;height:8px;border-radius:5px;background:#E7E5E0;overflow:hidden;\">\n          <div style=\"height:100%;border-radius:5px;background:#4F46E5;width:{{ percentWidth }};\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;height:22px;background:#E7E5E0;\"><\u002Fdiv>\n        <div style=\"font-size:13px;color:#5B6172;\">{{ currentUserName }}<\u002Fdiv>\n        <span style=\"font-size:13px;color:#9CA3AF;cursor:pointer;font-weight:600;\" onclick=\"{{ logoutHandler }}\">Log out<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1100px;margin:0 auto;padding:32px 24px 80px;\">\n\n    <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n      <section data-screen-label=\"Dashboard\" style=\"animation:fadeIn 0.3s ease;\">\n        <div style=\"margin-bottom:32px;\">\n          <div style=\"font-family:'Lexend';font-weight:700;font-size:34px;line-height:1.15;\">Learn computer science, MIT-style.<\u002Fdiv>\n          <div style=\"margin-top:10px;font-size:16px;color:#5B6172;max-width:640px;\">A self-paced path through the core ideas of an MIT-inspired computer science curriculum — theory, hands-on assignments, and quizzes for every topic.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-family:'Lexend';font-weight:600;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#5B6172;margin-bottom:14px;\">Curriculum map<\u002Fdiv>\n\n        <sc-for list=\"{{ years }}\" as=\"year\" hint-placeholder-count=\"4\">\n          <div style=\"margin-bottom:28px;\">\n            <div style=\"font-family:'Lexend';font-weight:600;font-size:16px;margin-bottom:12px;\">{{ year.name }}<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;\">\n              <sc-for list=\"{{ year.courses }}\" as=\"course\" hint-placeholder-count=\"3\">\n                <div style=\"background:#FFFFFF;border:1px solid #E7E5E0;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(20,20,30,0.05);cursor:{{ course.cursor }};opacity:{{ course.opacity }};\" onclick=\"{{ course.onClick }}\">\n                  <div style=\"font-family:'Lexend';font-weight:600;font-size:16px;margin-bottom:6px;\">{{ course.title }}<\u002Fdiv>\n                  <div style=\"font-size:13px;color:#5B6172;line-height:1.5;margin-bottom:14px;\">{{ course.desc }}<\u002Fdiv>\n                  <div style=\"display:inline-block;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;background:{{ course.badgeBg }};color:{{ course.badgeColor }};\">{{ course.statusLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <div style=\"margin-top:12px;\">\n          <span style=\"font-size:12px;color:#9CA3AF;cursor:pointer;\" onclick=\"{{ resetAllHandler }}\">Reset all progress<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isCourse }}\">\n      <section data-screen-label=\"Course\" style=\"animation:fadeIn 0.3s ease;\">\n        <div style=\"font-size:13px;color:#5B6172;margin-bottom:10px;\">\n          <span style=\"cursor:pointer;\" onclick=\"{{ goToDashboardHandler }}\">Home<\u002Fspan> / Introduction to Computer Science &amp; Programming\n        <\u002Fdiv>\n        <div style=\"font-family:'Lexend';font-weight:700;font-size:28px;margin-bottom:6px;\">Introduction to Computer Science &amp; Programming<\u002Fdiv>\n        <div style=\"font-size:15px;color:#5B6172;margin-bottom:10px;max-width:640px;\">Six modules covering the foundational ideas of programming: variables, control flow, functions, data structures, algorithms, and testing — each with theory, a coding assignment, and a quiz.<\u002Fdiv>\n        <div style=\"font-size:13px;color:#4F46E5;font-weight:600;margin-bottom:24px;\">~{{ totalHours }} hours total<\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <sc-for list=\"{{ modulesWithMeta }}\" as=\"m\" hint-placeholder-count=\"6\">\n            <div style=\"background:#FFFFFF;border:1px solid #E7E5E0;border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;\" onclick=\"{{ m.open }}\">\n              <div style=\"display:flex;align-items:center;gap:16px;\">\n                <div style=\"width:36px;height:36px;border-radius:10px;background:{{ m.numBg }};color:{{ m.numColor }};display:flex;align-items:center;justify-content:center;font-family:'Lexend';font-weight:700;font-size:15px;flex-shrink:0;\">{{ m.number }}<\u002Fdiv>\n                <div>\n                  <div style=\"font-family:'Lexend';font-weight:600;font-size:16px;\">{{ m.title }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#5B6172;margin-top:3px;\">{{ m.statusLabel }} · ~{{ m.hours }} hrs<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:6px;flex-shrink:0;\">\n                <div style=\"width:9px;height:9px;border-radius:50%;background:{{ m.theoryDotColor }};\"><\u002Fdiv>\n                <div style=\"width:9px;height:9px;border-radius:50%;background:{{ m.assignmentDotColor }};\"><\u002Fdiv>\n                <div style=\"width:9px;height:9px;border-radius:50%;background:{{ m.quizDotColor }};\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isLesson }}\">\n      <section data-screen-label=\"Lesson\" style=\"animation:fadeIn 0.3s ease;\">\n        <div style=\"font-size:13px;color:#5B6172;margin-bottom:10px;\">\n          <span style=\"cursor:pointer;\" onclick=\"{{ goToDashboardHandler }}\">Home<\u002Fspan> / <span style=\"cursor:pointer;\" onclick=\"{{ goToCourseHandler }}\">Course<\u002Fspan> / Module {{ currentModuleNumber }}\n        <\u002Fdiv>\n        <div style=\"font-family:'Lexend';font-weight:700;font-size:26px;margin-bottom:6px;\">{{ currentModuleTitle }}<\u002Fdiv>\n        <div style=\"font-size:13px;color:#5B6172;margin-bottom:20px;\">~{{ currentModuleHours }} hours<\u002Fdiv>\n\n        <div style=\"display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid #E7E5E0;\">\n          <div style=\"padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer;border-bottom:2px solid {{ theoryTabBorder }};color:{{ theoryTabColor }};\" onclick=\"{{ setTabTheoryHandler }}\">Theory {{ theoryCheck }}<\u002Fdiv>\n          <div style=\"padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer;border-bottom:2px solid {{ assignmentTabBorder }};color:{{ assignmentTabColor }};\" onclick=\"{{ setTabAssignmentHandler }}\">Assignment {{ assignmentCheck }}<\u002Fdiv>\n          <div style=\"padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer;border-bottom:2px solid {{ quizTabBorder }};color:{{ quizTabColor }};\" onclick=\"{{ setTabQuizHandler }}\">Quiz {{ quizCheck }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ isTheoryTab }}\">\n          <div style=\"background:#FFFFFF;border:1px solid #E7E5E0;border-radius:16px;padding:28px;max-width:720px;\">\n            <sc-for list=\"{{ theoryBlocks }}\" as=\"block\" hint-placeholder-count=\"4\">\n              <sc-if value=\"{{ block.isHeading }}\">\n                <div style=\"font-family:'Lexend';font-weight:600;font-size:18px;margin:20px 0 8px;\">{{ block.content }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ block.isP }}\">\n                <div style=\"font-size:15px;line-height:1.7;color:#333846;margin-bottom:6px;text-wrap:pretty;\">{{ block.content }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ block.isCode }}\">\n                <pre style=\"background:#1E2230;color:#E7E5E0;border-radius:10px;padding:16px;font-family:ui-monospace,Menlo,monospace;font-size:13px;line-height:1.6;overflow-x:auto;margin:10px 0;white-space:pre-wrap;\">{{ block.content }}<\u002Fpre>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ block.isList }}\">\n                <ul style=\"margin:6px 0 14px;padding-left:20px;\">\n                  <sc-for list=\"{{ block.items }}\" as=\"item\">\n                    <li style=\"font-size:15px;line-height:1.7;color:#333846;\">{{ item }}<\u002Fli>\n                  <\u002Fsc-for>\n                <\u002Ful>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n            <div style=\"margin-top:24px;\">\n              <button style=\"background:#4F46E5;color:#FFFFFF;border:none;border-radius:10px;padding:12px 22px;font-weight:600;font-size:14px;cursor:pointer;font-family:'Inter';\" onclick=\"{{ markTheoryDoneHandler }}\">Mark as read — go to assignment →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isAssignmentTab }}\">\n          <div style=\"background:#FFFFFF;border:1px solid #E7E5E0;border-radius:16px;padding:28px;max-width:720px;\">\n            <div style=\"font-size:15px;line-height:1.7;margin-bottom:16px;\">{{ assignmentInstructions }}<\u002Fdiv>\n            <textarea spellcheck=\"false\" style=\"width:100%;min-height:170px;background:#1E2230;color:#E7E5E0;border:none;border-radius:10px;padding:16px;font-family:ui-monospace,Menlo,monospace;font-size:13px;line-height:1.6;box-sizing:border-box;\" value=\"{{ code }}\" onchange=\"{{ updateCodeHandler }}\"><\u002Ftextarea>\n            <div style=\"display:flex;gap:10px;margin-top:12px;\">\n              <button style=\"background:#4F46E5;color:#FFFFFF;border:none;border-radius:10px;padding:11px 20px;font-weight:600;font-size:14px;cursor:pointer;\" onclick=\"{{ runTestsHandler }}\">Run tests<\u002Fbutton>\n              <button style=\"background:#F1F0EC;color:#5B6172;border:none;border-radius:10px;padding:11px 20px;font-weight:600;font-size:14px;cursor:pointer;\" onclick=\"{{ resetCodeHandler }}\">Reset code<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasResults }}\">\n              <div style=\"margin-top:18px;display:flex;flex-direction:column;gap:8px;\">\n                <sc-for list=\"{{ results }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:10px;font-size:14px;padding:10px 14px;border-radius:8px;background:{{ r.bg }};\">\n                    <div style=\"font-weight:700;color:{{ r.color }};\">{{ r.icon }}<\u002Fdiv>\n                    <div style=\"color:#333846;\">{{ r.finalDesc }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ allPass }}\">\n              <div style=\"margin-top:18px;background:#ECFDF3;border-radius:10px;padding:14px 16px;font-size:14px;color:#15803D;font-weight:600;\">All tests passed! Ready for the quiz.<\u002Fdiv>\n              <div style=\"margin-top:14px;\">\n                <button style=\"background:#4F46E5;color:#FFFFFF;border:none;border-radius:10px;padding:12px 22px;font-weight:600;font-size:14px;cursor:pointer;\" onclick=\"{{ setTabQuizHandler }}\">Continue to quiz →<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isQuizTab }}\">\n          <div style=\"background:#FFFFFF;border:1px solid #E7E5E0;border-radius:16px;padding:28px;max-width:720px;\">\n            <sc-for list=\"{{ quizQuestions }}\" as=\"q\" hint-placeholder-count=\"4\">\n              <div style=\"margin-bottom:22px;\">\n                <div style=\"font-weight:600;font-size:15px;margin-bottom:10px;\">{{ q.question }}<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                  <sc-for list=\"{{ q.options }}\" as=\"opt\">\n                    <div style=\"padding:11px 14px;border-radius:10px;border:1.5px solid {{ opt.borderColor }};background:{{ opt.bg }};cursor:pointer;font-size:14px;color:#1E2230;\" onclick=\"{{ opt.onClick }}\">{{ opt.text }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ showSubmitQuiz }}\">\n              <button style=\"background:#4F46E5;color:#FFFFFF;border:none;border-radius:10px;padding:12px 22px;font-weight:600;font-size:14px;cursor:pointer;\" onclick=\"{{ submitQuizHandler }}\">Submit quiz<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ quizSubmittedFlag }}\">\n              <div style=\"margin-top:6px;padding:16px;border-radius:10px;background:{{ scoreBg }};\">\n                <div style=\"font-weight:700;font-size:16px;color:{{ scoreColor }};margin-bottom:4px;\">Score: {{ quizScorePercent }}%<\u002Fdiv>\n                <div style=\"font-size:13px;color:#5B6172;margin-bottom:12px;\">{{ scoreMessage }}<\u002Fdiv>\n                <div style=\"display:flex;gap:10px;\">\n                  <button style=\"background:#F1F0EC;color:#5B6172;border:none;border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer;\" onclick=\"{{ retakeQuizHandler }}\">Try again<\u002Fbutton>\n                  <sc-if value=\"{{ quizPassed }}\">\n                    <button style=\"background:#4F46E5;color:#FFFFFF;border:none;border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer;\" onclick=\"{{ nextModuleHandler }}\">{{ nextButtonLabel }}<\u002Fbutton>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:24px;max-width:720px;\">\n          <button style=\"background:none;border:none;color:#5B6172;font-weight:600;font-size:14px;cursor:pointer;visibility:{{ prevVisibility }};\" onclick=\"{{ prevModuleHandler }}\">← Previous module<\u002Fbutton>\n          <button style=\"background:none;border:1px solid #E7E5E0;border-radius:8px;padding:8px 14px;color:#5B6172;font-weight:600;font-size:13px;cursor:pointer;\" onclick=\"{{ goToCourseHandler }}\">Back to module list<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    view: 'dashboard',\n    currentModule: 0,\n    currentTab: 'theory',\n    code: {},\n    testResults: {},\n    quizAnswers: {},\n    quizSubmitted: {},\n    progress: {},\n    currentUser: null,\n    authMode: 'login',\n    authName: '',\n    authEmail: '',\n    authPassword: '',\n    authError: ''\n  };\n\n  modules = [\n    {\n      id: 'variables',\n      title: 'Computation & Variables',\n      hours: 2,\n      theory: [\n        { type: 'heading', content: 'What is a variable?' },\n        { type: 'p', content: 'A variable is a named place to store a value while your program runs — think of it as a labeled box. Once you give a box a name, you can put a value in it, use it in calculations, and change it later.' },\n        { type: 'code', content: 'let width = 4;\\nlet height = 3;\\nlet area = width * height;\\nconsole.log(area); // 12' },\n        { type: 'heading', content: 'The core data types' },\n        { type: 'list', items: ['Number — 4, 3.14, -2 (integers and decimals)', 'String — \"hello\" (text, in quotes)', 'Boolean — true or false (used for decisions)'] },\n        { type: 'p', content: 'Every value in a program has a type, and the type determines what you can do with it. You can add two numbers, but adding a number to a string usually joins them as text instead.' },\n        { type: 'heading', content: 'Operators' },\n        { type: 'p', content: 'Arithmetic operators (+ - * / %) combine numbers. The % operator, \"modulo\", returns the remainder of a division — 7 % 2 is 1, because 7 divided by 2 leaves a remainder of 1. Comparison operators (== > < >=) compare values and produce a boolean.' },\n        { type: 'heading', content: 'Why this matters' },\n        { type: 'p', content: 'Variables are the foundation of every program you will ever write. Every app, website, and operating system is, underneath, just variables being created, combined, and changed.' }\n      ],\n      assignment: {\n        functionName: 'rectangleArea',\n        instructions: 'Write a function rectangleArea(width, height) that returns the area of a rectangle.',\n        starterCode: 'function rectangleArea(width, height) {\\n  // your code here\\n}',\n        tests: [\n          { args: [4, 3], expected: 12, desc: '4 × 3 should be 12' },\n          { args: [5, 5], expected: 25, desc: '5 × 5 should be 25' },\n          { args: [2, 7], expected: 14, desc: '2 × 7 should be 14' }\n        ]\n      },\n      quiz: [\n        { question: 'What does `let x = 5;` do?', options: ['Creates a variable x holding 5', 'Checks if x equals 5', 'Deletes variable x', 'Prints 5 to the screen'], correct: 0 },\n        { question: 'Which of these is a String value?', options: ['\"5\"', '5', 'true', '5.0'], correct: 0 },\n        { question: 'What is 7 % 2 in JavaScript?', options: ['1', '3.5', '0', '14'], correct: 0 },\n        { question: 'Which data type stores true or false?', options: ['Boolean', 'Number', 'String', 'Variable'], correct: 0 }\n      ]\n    },\n    {\n      id: 'control-flow',\n      title: 'Control Flow',\n      hours: 3,\n      theory: [\n        { type: 'heading', content: 'Making decisions: if / else' },\n        { type: 'p', content: 'An if statement runs a block of code only when a condition is true. Add an else block to run different code when it is false.' },\n        { type: 'code', content: 'let age = 20;\\nif (age >= 18) {\\n  console.log(\"Adult\");\\n} else {\\n  console.log(\"Minor\");\\n}' },\n        { type: 'heading', content: 'Combining conditions' },\n        { type: 'p', content: 'Boolean operators combine conditions: && means \"and\" (both must be true), || means \"or\" (at least one must be true), and ! flips true to false.' },\n        { type: 'heading', content: 'Repeating: loops' },\n        { type: 'p', content: 'A for loop repeats a block a set number of times. A while loop repeats as long as a condition stays true — useful when you do not know the number of repetitions in advance.' },\n        { type: 'code', content: 'for (let i = 0; i < 5; i++) {\\n  console.log(i);\\n} // prints 0 1 2 3 4' },\n        { type: 'heading', content: 'Why this matters' },\n        { type: 'p', content: 'Control flow lets a program react to input and repeat work automatically — nearly every algorithm you will ever study is built from these two ideas: branching and looping.' }\n      ],\n      assignment: {\n        functionName: 'isPrime',\n        instructions: 'Write a function isPrime(n) that returns true if n is a prime number (greater than 1, divisible only by 1 and itself), and false otherwise.',\n        starterCode: 'function isPrime(n) {\\n  // return true if n is prime, false otherwise\\n}',\n        tests: [\n          { args: [7], expected: true, desc: '7 is prime' },\n          { args: [8], expected: false, desc: '8 is not prime (8 = 2×4)' },\n          { args: [2], expected: true, desc: '2 is prime' },\n          { args: [1], expected: false, desc: '1 is not prime by definition' }\n        ]\n      },\n      quiz: [\n        { question: 'What does the % (modulo) operator return?', options: ['The remainder of a division', 'The result of a division', 'A random number', 'A percentage'], correct: 0 },\n        { question: 'Which operator means logical AND?', options: ['&&', '||', '!', '=='], correct: 0 },\n        { question: 'How many times does this loop run? for(let i=0;i<3;i++)', options: ['3', '2', '4', 'Infinite'], correct: 0 },\n        { question: 'What is the risk with a while loop?', options: ['It can run forever if the condition never becomes false', 'It always runs exactly once', 'It cannot use variables', 'It only works with numbers'], correct: 0 }\n      ]\n    },\n    {\n      id: 'functions',\n      title: 'Functions & Recursion',\n      hours: 3,\n      theory: [\n        { type: 'heading', content: 'Functions: giving code a name' },\n        { type: 'p', content: 'A function packages a sequence of steps under a name so you can reuse it. It can take inputs (parameters) and produce an output (a return value).' },\n        { type: 'code', content: 'function square(x) {\\n  return x * x;\\n}\\nconsole.log(square(5)); // 25' },\n        { type: 'heading', content: 'Recursion' },\n        { type: 'p', content: 'A recursive function calls itself to solve a smaller version of the same problem. Every recursive function needs a base case — a condition where it stops calling itself — or it will run forever.' },\n        { type: 'code', content: 'function factorial(n) {\\n  if (n <= 1) return 1; // base case\\n  return n * factorial(n - 1); // recursive case\\n}\\nconsole.log(factorial(5)); // 120' },\n        { type: 'heading', content: 'Why this matters' },\n        { type: 'p', content: 'Breaking problems into functions — and sometimes into smaller versions of themselves — is the core skill of programming, and the foundation for every algorithm you will study later.' }\n      ],\n      assignment: {\n        functionName: 'factorial',\n        instructions: 'Write a recursive function factorial(n) that returns n! (n factorial). Remember: 0! is 1.',\n        starterCode: 'function factorial(n) {\\n  // base case: if n <= 1, return 1\\n  // recursive case: return n * factorial(n - 1)\\n}',\n        tests: [\n          { args: [0], expected: 1, desc: '0! is 1' },\n          { args: [1], expected: 1, desc: '1! is 1' },\n          { args: [5], expected: 120, desc: '5! is 120' },\n          { args: [6], expected: 720, desc: '6! is 720' }\n        ]\n      },\n      quiz: [\n        { question: 'What must every recursive function have to avoid running forever?', options: ['A base case', 'A loop', 'A return value', 'A parameter'], correct: 0 },\n        { question: 'What does factorial(3) equal?', options: ['6', '3', '9', '1'], correct: 0 },\n        { question: 'What is a \"parameter\"?', options: ['An input a function receives', 'The output of a function', 'A type of loop', 'A variable declared outside a function'], correct: 0 },\n        { question: 'What happens if a recursive function never reaches its base case?', options: ['It causes a stack overflow / runs forever', 'It returns 0', 'It runs once and stops', 'Nothing, it self-corrects'], correct: 0 }\n      ]\n    },\n    {\n      id: 'data-structures',\n      title: 'Data Structures',\n      hours: 4,\n      theory: [\n        { type: 'heading', content: 'Lists (arrays)' },\n        { type: 'p', content: 'A list stores an ordered collection of values. Each value has an index — a position, starting at 0 — so you can access, add, or remove items directly.' },\n        { type: 'code', content: 'let fruits = [\"apple\", \"banana\", \"cherry\"];\\nconsole.log(fruits[0]); // \"apple\"\\nfruits.push(\"date\");' },\n        { type: 'heading', content: 'Objects (dictionaries)' },\n        { type: 'p', content: 'An object stores values under named keys instead of numeric positions — useful when you want to look things up by name rather than position.' },\n        { type: 'code', content: 'let ages = { alice: 30, bob: 25 };\\nconsole.log(ages[\"alice\"]); // 30' },\n        { type: 'heading', content: 'Choosing the right structure' },\n        { type: 'p', content: 'Use a list when order matters and you will access items by position. Use an object when you need to look values up by a meaningful name or key, like counting how often each word appears.' },\n        { type: 'heading', content: 'Why this matters' },\n        { type: 'p', content: 'Almost every real program organizes data with lists and objects — from a shopping cart to a social network\\u2019s friend list.' }\n      ],\n      assignment: {\n        functionName: 'countWords',\n        instructions: 'Write a function countWords(str) that takes a sentence and returns an object mapping each word to how many times it appears. Split the sentence on spaces.',\n        starterCode: 'function countWords(str) {\\n  // split str by spaces, count each word\\n  // return an object like { the: 2, cat: 1 }\\n}',\n        tests: [\n          { args: ['the cat sat on the mat'], expected: { the: 2, cat: 1, sat: 1, on: 1, mat: 1 }, desc: 'counts repeated words' },\n          { args: ['a a a'], expected: { a: 3 }, desc: 'counts all-same words' }\n        ]\n      },\n      quiz: [\n        { question: 'How do you access the first item of a list called items?', options: ['items[0]', 'items[1]', 'items.first()', 'items(0)'], correct: 0 },\n        { question: 'What does an object use to store values, instead of numeric positions?', options: ['Named keys', 'Timestamps', 'Colors', 'Random IDs'], correct: 0 },\n        { question: 'Which structure best fits \"how many times does each word appear\"?', options: ['An object (word → count)', 'A single number', 'A boolean', 'A string'], correct: 0 },\n        { question: 'What does .push() do to a list?', options: ['Adds an item to the end', 'Removes the first item', 'Sorts the list', 'Empties the list'], correct: 0 }\n      ]\n    },\n    {\n      id: 'algorithms',\n      title: 'Algorithms & Complexity',\n      hours: 5,\n      theory: [\n        { type: 'heading', content: 'Measuring efficiency: Big-O' },\n        { type: 'p', content: 'Big-O notation describes how an algorithm\\u2019s running time grows as the input gets bigger. O(1) is constant — same speed regardless of size. O(n) is linear — doubling the input doubles the work. O(n\\u00b2) is quadratic — doubling the input quadruples the work.' },\n        { type: 'heading', content: 'Searching' },\n        { type: 'p', content: 'A linear search checks every item one by one — O(n). A binary search repeatedly cuts a sorted list in half, checking the middle each time — O(log n), dramatically faster for large lists.' },\n        { type: 'code', content: 'function binarySearch(arr, target) {\\n  let lo = 0, hi = arr.length - 1;\\n  while (lo <= hi) {\\n    let mid = Math.floor((lo + hi) / 2);\\n    if (arr[mid] === target) return mid;\\n    if (arr[mid] < target) lo = mid + 1;\\n    else hi = mid - 1;\\n  }\\n  return -1;\\n}' },\n        { type: 'heading', content: 'Sorting, briefly' },\n        { type: 'p', content: 'Simple sorts like bubble sort are O(n\\u00b2) and fine for small lists. Efficient sorts like merge sort achieve O(n log n) by repeatedly splitting and merging the list.' },\n        { type: 'heading', content: 'Why this matters' },\n        { type: 'p', content: 'As data grows, the difference between O(n) and O(n\\u00b2) can mean seconds versus days. Choosing the right algorithm is often more important than writing \"faster\" code.' }\n      ],\n      assignment: {\n        functionName: 'binarySearch',\n        instructions: 'Write a function binarySearch(arr, target) that returns the index of target in the sorted array arr, or -1 if it is not present.',\n        starterCode: 'function binarySearch(arr, target) {\\n  // arr is sorted — narrow the range each step\\n  // return the index of target, or -1\\n}',\n        tests: [\n          { args: [[1, 3, 5, 7, 9], 7], expected: 3, desc: 'finds 7 at index 3' },\n          { args: [[1, 3, 5, 7, 9], 4], expected: -1, desc: 'returns -1 when missing' },\n          { args: [[2, 4, 6, 8], 2], expected: 0, desc: 'finds a value at the start' }\n        ]\n      },\n      quiz: [\n        { question: 'What does O(n) mean?', options: ['Running time grows proportionally with input size', 'Running time never changes', 'The algorithm uses n bytes of memory', 'The algorithm has n bugs'], correct: 0 },\n        { question: 'What is required for binary search to work?', options: ['The array must be sorted', 'The array must contain only numbers', 'The array must be empty', 'The array must be reversed'], correct: 0 },\n        { question: 'Which is generally faster for large inputs?', options: ['O(log n)', 'O(n\\u00b2)', 'O(n\\u00b3)', 'They are all equal'], correct: 0 },\n        { question: 'What does a linear search do?', options: ['Checks each item one at a time until found', 'Splits the list in half repeatedly', 'Sorts the list first', 'Only works on sorted lists'], correct: 0 }\n      ]\n    },\n    {\n      id: 'testing',\n      title: 'Testing & Debugging',\n      hours: 3,\n      theory: [\n        { type: 'heading', content: 'Why test your code?' },\n        { type: 'p', content: 'A program that \"looks right\" can still be wrong. Testing means running your code against known inputs and checking the output matches what you expect — including tricky edge cases.' },\n        { type: 'heading', content: 'Edge cases' },\n        { type: 'p', content: 'Edge cases are inputs at the boundaries: empty strings, zero, negative numbers, very large inputs, or unexpected capitalization. Most bugs hide in edge cases, not the \"normal\" case.' },\n        { type: 'code', content: '// Normal case\\nisPalindrome(\"racecar\"); // true\\n// Edge cases\\nisPalindrome(\"\"); // true — reads the same both ways\\nisPalindrome(\"A man a plan a canal Panama\"); // true, ignoring case & spaces' },\n        { type: 'heading', content: 'Debugging strategies' },\n        { type: 'p', content: 'When code misbehaves: read the error message carefully, print (console.log) intermediate values to see what the program actually did, and shrink the problem to the smallest input that still fails.' },\n        { type: 'heading', content: 'Why this matters' },\n        { type: 'p', content: 'Professional developers spend as much time testing and debugging as writing new code. Treating tests as part of the job — not an afterthought — is what separates working software from fragile software.' }\n      ],\n      assignment: {\n        functionName: 'isPalindrome',\n        instructions: 'Write a function isPalindrome(str) that returns true if str reads the same forwards and backwards, ignoring letter case and spaces.',\n        starterCode: 'function isPalindrome(str) {\\n  // ignore case and spaces, then compare to its reverse\\n}',\n        tests: [\n          { args: ['racecar'], expected: true, desc: '\"racecar\" is a palindrome' },\n          { args: ['A man a plan a canal Panama'], expected: true, desc: 'ignores case and spaces' },\n          { args: ['hello'], expected: false, desc: '\"hello\" is not a palindrome' }\n        ]\n      },\n      quiz: [\n        { question: 'What is an \"edge case\"?', options: ['An input at the extreme or boundary of what is expected', 'A syntax error', 'A type of loop', 'A function with no parameters'], correct: 0 },\n        { question: 'Why test with an empty string?', options: ['It often reveals bugs that normal inputs hide', 'It always crashes the program', 'It is required by JavaScript', 'It makes the code run faster'], correct: 0 },\n        { question: 'What is a good first debugging step?', options: ['Read the error message and check variable values', 'Rewrite the whole program', 'Ignore it and move on', 'Delete the failing test'], correct: 0 },\n        { question: 'What does it mean to \"ignore case\" when comparing strings?', options: ['Treat uppercase and lowercase letters as equal', 'Only compare the first letter', 'Remove all letters', 'Reverse the string twice'], correct: 0 }\n      ]\n    }\n  ];\n\n  componentDidMount() {\n    try {\n      const session = localStorage.getItem('compute-academy-session');\n      if (session) {\n        const users = JSON.parse(localStorage.getItem('compute-academy-users') || '{}');\n        const u = users[session];\n        if (u) {\n          this.setState({ currentUser: { email: session, name: u.name } }, () => this.loadProgress());\n        }\n      }\n    } catch (e) {}\n  }\n\n  progressKey() {\n    return 'compute-academy-progress-' + (this.state.currentUser ? this.state.currentUser.email : 'anon');\n  }\n\n  loadProgress = () => {\n    try {\n      const saved = JSON.parse(localStorage.getItem(this.progressKey()) || '{}');\n      this.setState({\n        progress: saved.progress || {},\n        code: saved.code || {},\n        quizAnswers: saved.quizAnswers || {},\n        quizSubmitted: saved.quizSubmitted || {}\n      });\n    } catch (e) {}\n  };\n\n  persist(partial) {\n    this.setState(partial, () => {\n      try {\n        localStorage.setItem(this.progressKey(), JSON.stringify({\n          progress: this.state.progress,\n          code: this.state.code,\n          quizAnswers: this.state.quizAnswers,\n          quizSubmitted: this.state.quizSubmitted\n        }));\n      } catch (e) {}\n    });\n  }\n\n  updateAuthName = (e) => this.setState({ authName: e.target.value });\n  updateAuthEmail = (e) => this.setState({ authEmail: e.target.value, authError: '' });\n  updateAuthPassword = (e) => this.setState({ authPassword: e.target.value, authError: '' });\n  toggleAuthMode = () => this.setState({ authMode: this.state.authMode === 'login' ? 'signup' : 'login', authError: '' });\n\n  submitAuth = () => {\n    const email = (this.state.authEmail || '').trim().toLowerCase();\n    const password = this.state.authPassword || '';\n    const name = (this.state.authName || '').trim();\n    if (!email || !password) { this.setState({ authError: 'Please fill in email and password.' }); return; }\n    let users = {};\n    try { users = JSON.parse(localStorage.getItem('compute-academy-users') || '{}'); } catch (e) {}\n    if (this.state.authMode === 'signup') {\n      if (!name) { this.setState({ authError: 'Please enter your name.' }); return; }\n      if (users[email]) { this.setState({ authError: 'An account with this email already exists — log in instead.' }); return; }\n      users[email] = { name, password };\n      try { localStorage.setItem('compute-academy-users', JSON.stringify(users)); } catch (e) {}\n      try { localStorage.setItem('compute-academy-session', email); } catch (e) {}\n      this.setState({ currentUser: { email, name }, authError: '', authPassword: '' }, () => this.loadProgress());\n    } else {\n      const u = users[email];\n      if (!u || u.password !== password) { this.setState({ authError: 'Incorrect email or password.' }); return; }\n      try { localStorage.setItem('compute-academy-session', email); } catch (e) {}\n      this.setState({ currentUser: { email, name: u.name }, authError: '', authPassword: '' }, () => this.loadProgress());\n    }\n  };\n\n  logout = () => {\n    try { localStorage.removeItem('compute-academy-session'); } catch (e) {}\n    this.setState({\n      currentUser: null, view: 'dashboard', currentTab: 'theory', currentModule: 0,\n      progress: {}, code: {}, quizAnswers: {}, quizSubmitted: {}, testResults: {},\n      authEmail: '', authPassword: '', authName: '', authMode: 'login', authError: ''\n    });\n  };\n\n  goToDashboard = () => this.setState({ view: 'dashboard' });\n  goToCourse = () => this.setState({ view: 'course' });\n  openModule = (i) => this.setState({ view: 'lesson', currentModule: i, currentTab: 'theory' });\n  setTab = (tab) => this.setState({ currentTab: tab });\n\n  markTheoryDone = () => {\n    const m = this.modules[this.state.currentModule];\n    const progress = { ...this.state.progress };\n    progress[m.id] = { ...(progress[m.id] || {}), theory: true };\n    this.persist({ progress, currentTab: 'assignment' });\n  };\n\n  updateCode = (moduleId, val) => {\n    const code = { ...this.state.code, [moduleId]: val };\n    this.setState({ code });\n  };\n\n  resetCode = (moduleId, starter) => {\n    const code = { ...this.state.code, [moduleId]: starter };\n    this.setState({ code });\n  };\n\n  runTests = () => {\n    const m = this.modules[this.state.currentModule];\n    const a = m.assignment;\n    const code = this.state.code[m.id] ?? a.starterCode;\n    let results = [];\n    let fn;\n    try {\n      fn = new Function(code + '; return ' + a.functionName + ';')();\n    } catch (e) {\n      results = a.tests.map(t => ({ desc: t.desc, pass: false, error: e.message }));\n    }\n    if (fn) {\n      results = a.tests.map(t => {\n        try {\n          const got = fn(...t.args);\n          const pass = JSON.stringify(got) === JSON.stringify(t.expected);\n          return { desc: t.desc, pass, got: JSON.stringify(got) };\n        } catch (e) {\n          return { desc: t.desc, pass: false, error: e.message };\n        }\n      });\n    }\n    const allPass = results.length > 0 && results.every(r => r.pass);\n    const testResults = { ...this.state.testResults, [m.id]: results };\n    const progress = { ...this.state.progress };\n    progress[m.id] = { ...(progress[m.id] || {}), assignment: allPass };\n    this.persist({ testResults, progress });\n  };\n\n  selectAnswer = (moduleId, qIndex, optIndex) => {\n    const existing = this.state.quizAnswers[moduleId] || {};\n    const quizAnswers = { ...this.state.quizAnswers, [moduleId]: { ...existing, [qIndex]: optIndex } };\n    this.setState({ quizAnswers });\n  };\n\n  submitQuiz = () => {\n    const m = this.modules[this.state.currentModule];\n    const answers = this.state.quizAnswers[m.id] || {};\n    const correctCount = m.quiz.filter((q, i) => answers[i] === q.correct).length;\n    const score = correctCount / m.quiz.length;\n    const quizSubmitted = { ...this.state.quizSubmitted, [m.id]: true };\n    const progress = { ...this.state.progress };\n    progress[m.id] = { ...(progress[m.id] || {}), quiz: score >= 0.75 };\n    this.persist({ quizSubmitted, progress });\n  };\n\n  retakeQuiz = () => {\n    const m = this.modules[this.state.currentModule];\n    const quizSubmitted = { ...this.state.quizSubmitted, [m.id]: false };\n    const quizAnswers = { ...this.state.quizAnswers, [m.id]: {} };\n    this.setState({ quizSubmitted, quizAnswers });\n  };\n\n  nextModule = () => {\n    if (this.state.currentModule >= this.modules.length - 1) {\n      this.goToCourse();\n    } else {\n      this.setState({ currentModule: this.state.currentModule + 1, currentTab: 'theory' });\n    }\n  };\n  prevModule = () => {\n    const prev = Math.max(this.state.currentModule - 1, 0);\n    this.setState({ currentModule: prev, currentTab: 'theory' });\n  };\n\n  resetAll = () => {\n    try { localStorage.removeItem(this.progressKey()); } catch (e) {}\n    this.setState({ progress: {}, code: {}, quizAnswers: {}, quizSubmitted: {}, testResults: {} });\n  };\n\n  renderVals() {\n    const modules = this.modules;\n    const progress = this.state.progress;\n    const totalItems = modules.length * 3;\n    let doneItems = 0;\n    const modulesWithMeta = modules.map((m, i) => {\n      const p = progress[m.id] || {};\n      const theoryDone = !!p.theory, assignmentDone = !!p.assignment, quizDone = !!p.quiz;\n      if (theoryDone) doneItems++;\n      if (assignmentDone) doneItems++;\n      if (quizDone) doneItems++;\n      const allDone = theoryDone && assignmentDone && quizDone;\n      const anyDone = theoryDone || assignmentDone || quizDone;\n      return {\n        index: i, id: m.id, number: i + 1, title: m.title, hours: m.hours,\n        theoryDotColor: theoryDone ? '#16A34A' : '#E7E5E0',\n        assignmentDotColor: assignmentDone ? '#16A34A' : '#E7E5E0',\n        quizDotColor: quizDone ? '#16A34A' : '#E7E5E0',\n        numBg: allDone ? '#ECFDF3' : (anyDone ? '#EEF2FF' : '#F1F0EC'),\n        numColor: allDone ? '#16A34A' : (anyDone ? '#4F46E5' : '#9CA3AF'),\n        statusLabel: allDone ? 'Completed' : (anyDone ? 'In progress' : 'Not started'),\n        open: () => this.openModule(i)\n      };\n    });\n    const percent = Math.round((doneItems / totalItems) * 100);\n    const totalHours = modules.reduce((sum, m) => sum + m.hours, 0);\n\n    const introStatus = percent === 0 ? 'Start course' : (percent === 100 ? 'Completed' : ('Continue — ' + percent + '%'));\n    const introBadgeBg = percent === 100 ? '#ECFDF3' : (percent === 0 ? '#EEF2FF' : '#FFF1EC');\n    const introBadgeColor = percent === 100 ? '#16A34A' : (percent === 0 ? '#4F46E5' : '#FF6B4A');\n\n    const comingSoon = { enabled: false, statusLabel: 'Coming soon', badgeBg: '#F1F0EC', badgeColor: '#9CA3AF', cursor: 'default', opacity: '0.6', onClick: undefined };\n\n    const years = [\n      { name: 'Year 1', courses: [\n        { title: 'Introduction to Computer Science & Programming', desc: 'Variables, control flow, functions, data structures, algorithms & testing.', enabled: true, statusLabel: introStatus, badgeBg: introBadgeBg, badgeColor: introBadgeColor, cursor: 'pointer', opacity: '1', onClick: () => this.goToCourse() },\n        { title: 'Mathematics for Computer Science', desc: 'Proofs, logic, number theory, counting.', ...comingSoon },\n        { title: 'Linear Algebra', desc: 'Vectors, matrices, transformations.', ...comingSoon }\n      ] },\n      { name: 'Year 2', courses: [\n        { title: 'Data Structures & Algorithms', desc: 'Trees, graphs, hashing, algorithm design.', ...comingSoon },\n        { title: 'Computer Systems Engineering', desc: 'Memory, computer architecture, C.', ...comingSoon },\n        { title: 'Discrete Mathematics', desc: 'Combinatorics, graph theory, probability.', ...comingSoon }\n      ] },\n      { name: 'Year 3', courses: [\n        { title: 'Operating Systems', desc: 'Processes, concurrency, memory management.', ...comingSoon },\n        { title: 'Computer Networks', desc: 'Protocols, routing, distributed communication.', ...comingSoon },\n        { title: 'Database Systems', desc: 'Relational models, query optimization, transactions.', ...comingSoon }\n      ] },\n      { name: 'Year 4', courses: [\n        { title: 'Artificial Intelligence', desc: 'Search, machine learning, neural networks.', ...comingSoon },\n        { title: 'Distributed Systems', desc: 'Consensus, fault tolerance, scalability.', ...comingSoon },\n        { title: 'Capstone Project', desc: 'A full software system, designed and built independently.', ...comingSoon }\n      ] }\n    ];\n\n    const currentModule = modules[this.state.currentModule];\n    const cp = progress[currentModule.id] || {};\n    const tab = this.state.currentTab;\n    const isTheoryTab = tab === 'theory', isAssignmentTab = tab === 'assignment', isQuizTab = tab === 'quiz';\n\n    const theoryBlocks = currentModule.theory.map(b => ({\n      isHeading: b.type === 'heading', isP: b.type === 'p', isCode: b.type === 'code', isList: b.type === 'list',\n      content: b.content, items: b.items || []\n    }));\n\n    const code = this.state.code[currentModule.id] ?? currentModule.assignment.starterCode;\n    const rawResults = this.state.testResults[currentModule.id] || [];\n    const results = rawResults.map(r => ({\n      pass: r.pass,\n      icon: r.pass ? '✓' : '✕',\n      bg: r.pass ? '#ECFDF3' : '#FEF2F2',\n      color: r.pass ? '#16A34A' : '#DC2626',\n      finalDesc: r.desc + (r.error ? (' — Error: ' + r.error) : (r.pass ? '' : (' — got ' + r.got)))\n    }));\n    const hasResults = results.length > 0;\n    const allPass = hasResults && results.every(r => r.pass);\n\n    const qAnswers = this.state.quizAnswers[currentModule.id] || {};\n    const submitted = !!this.state.quizSubmitted[currentModule.id];\n    const quizQuestions = currentModule.quiz.map((q, qi) => ({\n      question: q.question,\n      answered: qAnswers[qi] !== undefined,\n      options: q.options.map((opt, oi) => {\n        const isSelected = qAnswers[qi] === oi;\n        const isCorrectOpt = oi === q.correct;\n        let bg = '#FFFFFF', borderColor = '#E7E5E0';\n        if (submitted) {\n          if (isCorrectOpt) { bg = '#ECFDF3'; borderColor = '#16A34A'; }\n          else if (isSelected) { bg = '#FEF2F2'; borderColor = '#DC2626'; }\n        } else if (isSelected) {\n          bg = '#EEF2FF'; borderColor = '#4F46E5';\n        }\n        return { text: opt, bg, borderColor, onClick: submitted ? undefined : (() => this.selectAnswer(currentModule.id, qi, oi)) };\n      })\n    }));\n    const allAnswered = quizQuestions.every(q => q.answered);\n    const showSubmitQuiz = allAnswered && !submitted;\n    const correctCount = submitted ? currentModule.quiz.filter((q, i) => qAnswers[i] === q.correct).length : 0;\n    const quizScorePercent = submitted ? Math.round((correctCount / currentModule.quiz.length) * 100) : 0;\n    const quizPassed = submitted && quizScorePercent >= 75;\n    const scoreBg = quizPassed ? '#ECFDF3' : '#FEF2F2';\n    const scoreColor = quizPassed ? '#16A34A' : '#DC2626';\n    const scoreMessage = quizPassed ? 'Nice work — module complete!' : 'Score at least 75% to complete this module. Review the theory and try again.';\n\n    const isLastModule = this.state.currentModule >= modules.length - 1;\n    const nextButtonLabel = isLastModule ? 'Finish course →' : 'Next module →';\n\n    const authModeIsSignup = this.state.authMode === 'signup';\n\n    return {\n      isAuthed: !!this.state.currentUser,\n      showAuth: !this.state.currentUser,\n      authModeIsSignup,\n      authTitle: authModeIsSignup ? 'Create your account' : 'Welcome back',\n      authSubtitle: authModeIsSignup ? 'Start your MIT-inspired CS path.' : 'Log in to continue your progress.',\n      authToggleQuestion: authModeIsSignup ? 'Already have an account?' : \"Don't have an account?\",\n      authToggleAction: authModeIsSignup ? 'Log in' : 'Sign up',\n      authSubmitLabel: authModeIsSignup ? 'Create account' : 'Log in',\n      hasAuthError: !!this.state.authError,\n      authError: this.state.authError,\n      authName: this.state.authName,\n      authEmail: this.state.authEmail,\n      authPassword: this.state.authPassword,\n      updateAuthNameHandler: (e) => this.updateAuthName(e),\n      updateAuthEmailHandler: (e) => this.updateAuthEmail(e),\n      updateAuthPasswordHandler: (e) => this.updateAuthPassword(e),\n      submitAuthHandler: () => this.submitAuth(),\n      toggleAuthModeHandler: () => this.toggleAuthMode(),\n      currentUserName: this.state.currentUser ? this.state.currentUser.name : '',\n      logoutHandler: () => this.logout(),\n      isDashboard: this.state.view === 'dashboard',\n      isCourse: this.state.view === 'course',\n      isLesson: this.state.view === 'lesson',\n      percent, percentWidth: percent + '%',\n      years, modulesWithMeta, totalHours,\n      currentModuleHours: currentModule.hours,\n      goToDashboardHandler: () => this.goToDashboard(),\n      goToCourseHandler: () => this.goToCourse(),\n      resetAllHandler: () => this.resetAll(),\n      currentModuleNumber: this.state.currentModule + 1,\n      currentModuleTitle: currentModule.title,\n      isTheoryTab, isAssignmentTab, isQuizTab,\n      theoryTabBorder: isTheoryTab ? '#4F46E5' : 'transparent',\n      theoryTabColor: isTheoryTab ? '#1E2230' : '#9CA3AF',\n      assignmentTabBorder: isAssignmentTab ? '#4F46E5' : 'transparent',\n      assignmentTabColor: isAssignmentTab ? '#1E2230' : '#9CA3AF',\n      quizTabBorder: isQuizTab ? '#4F46E5' : 'transparent',\n      quizTabColor: isQuizTab ? '#1E2230' : '#9CA3AF',\n      theoryCheck: cp.theory ? '✓' : '',\n      assignmentCheck: cp.assignment ? '✓' : '',\n      quizCheck: cp.quiz ? '✓' : '',\n      setTabTheoryHandler: () => this.setTab('theory'),\n      setTabAssignmentHandler: () => this.setTab('assignment'),\n      setTabQuizHandler: () => this.setTab('quiz'),\n      theoryBlocks,\n      markTheoryDoneHandler: () => this.markTheoryDone(),\n      assignmentInstructions: currentModule.assignment.instructions,\n      code,\n      updateCodeHandler: (e) => this.updateCode(currentModule.id, e.target.value),\n      resetCodeHandler: () => this.resetCode(currentModule.id, currentModule.assignment.starterCode),\n      runTestsHandler: () => this.runTests(),\n      hasResults, results, allPass,\n      quizQuestions, showSubmitQuiz,\n      submitQuizHandler: () => this.submitQuiz(),\n      quizSubmittedFlag: submitted,\n      quizScorePercent, quizPassed, scoreBg, scoreColor, scoreMessage,\n      retakeQuizHandler: () => this.retakeQuiz(),\n      nextModuleHandler: () => this.nextModule(),\n      nextButtonLabel,\n      prevModuleHandler: () => this.prevModule(),\n      prevVisibility: this.state.currentModule === 0 ? 'hidden' : 'visible'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
